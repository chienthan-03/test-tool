# Dev/default config — same strategy as config/production.yaml.
# allowLive: false until you complete docs/LIVE-SAFETY-CHECKLIST.md (then set true for live only).
mode: sim

allowLive: false

symbols:
  - BTCUSDT
  - ETHUSDT
  - SOLUSDT
  - BNBUSDT
  - XRPUSDT

symbolOverrides: {}

timeframes:
  context: 1d
  entry: 4h

feeds:
  - id: coindesk
    url: https://www.coindesk.com/arc/outboundfeeds/rss/
    pollIntervalSec: 90
    enabled: true
  - id: cointelegraph
    url: https://cointelegraph.com/rss
    pollIntervalSec: 120
    enabled: true

# Win-rate: rule-only sentiment (Phase 3). LLM adds latency/cost; enable only after A/B backtest.
sentiment:
  rules:
    impactHigh: 3
    thresholdLLM: 3
    minStrength: 0.5
    strongNewsThreshold: 0.75
    bullishKeywords:
      - rally
      - approval
      - inflow
      - rate cut
      - partnership
      - surge
    bearishKeywords:
      - hack
      - exploit
      - ban
      - lawsuit
      - outflow
      - rate hike
      - crash
    bearishTags:
      - hack
      - regulation
    macroTags:
      - macro
      - fed
      - cpi
    blacklistKeywords:
      - airdrop scam
      - guaranteed returns
    tagRules:
      - tag: macro
        keywords: [fed, cpi, fomc, interest rate, powell]
        impact: 3
      - tag: hack
        keywords: [hack, exploited, drained, breach]
        impact: 3
        sentiment: -1
      - tag: etf
        keywords: [etf, approval, inflow]
        impact: 2
  llm:
    enabled: false # Phase 3 preset — keep false for production parity with backtest matrix
    provider: openrouter
    baseUrl: https://openrouter.ai/api/v1
    model: openai/gpt-oss-120b:free
    maxCallsPerHour: 20
    minConfidence: 0.6
    timeoutMs: 15000
    defaultTtlMinutes: 45

# MTF entry (Phase 4): context 1d / entry 4h; fib zone 0.02 validated in Phase 6 matrix.
strategy:
  triggerMode: news   # news | technical — technical: no RSS, EMA context direction, scan symbols each entry candle
  atrPeriod: 14
  minAtrPercent: 0.12
  maxAtrPercent: 3.5
  entry:
    waitForNextCandleClose: true
  onePositionPerSymbol: true
  swing:
    lookback: 3
    minSwingCount: 5
    minImpulsePercent: 80
  elliott:
    allowSideways: false
    contextRequireImpulse: false
  fibonacci:
    entryMin: 0.382
    entryMax: 0.618
    zoneTolerancePercent: 0.02 # Phase 4/6 — tighter than 0.05 pre-research
    stopLevel: 0.886
    targetExtension: 1.618
    stopBelowSwing: true
    stopBufferPercent: 0.002
  entryProfile: swing
  profiles:
    swing:
      contextMode: elliott
      entryPaths:
        primary: fib
      useAlternateFallback: true
    intraday:
      contextMode: emaTrend
      contextEma:
        fastPeriod: 20
        slowPeriod: 50
        flatPercent: 0.0005
      entryPaths:
        order: [breakout, emaMomentum]
      positionScale: 0.75
  alternateEntries:
    enabled: false
    order:
      - breakout
      - emaMomentum
    fallbackOnReasons:
      - outside_fib_zone
      - no_matching_impulse_leg
      - risk_reward_too_low
    positionScale: 1
    breakout:
      enabled: true
      lookbackBars: 20
      bufferPercent: 0.001
    emaMomentum:
      enabled: true
      fastPeriod: 9
      slowPeriod: 21
      slopeLookback: 3

# Risk (Phase 7): cooldown off on baseline matrix; tune via risk.cooldownAfterLoss experiments.
risk:
  positionPercent: 15
  minNotionalUsdt: 5
  maxNotionalUsdt: null
  slAtrMultiplier: 2.0
  tpAtrMultiplier: 3.0
  trailingStop: false
  cooldownAfterLoss:
    enabled: false # Phase 7 — risk-baseline won vs 12h/24h cooldown variants
    durationHours: 12

binance:
  baseUrl: https://fapi.binance.com
  testnetBaseUrl: https://testnet.binancefuture.com
  testnetWsUrl: wss://stream.binancefuture.com
  mainnetWsUrl: wss://fstream.binance.com
  recvWindow: 5000
  wsReconnectMaxRetries: 10
  margin:
    enabled: true
    mode: isolated
    leverage: 5
  circuitBreaker:
    enabled: true
    maxFailures: 3
    windowMs: 300000

sim:
  leverage: 6
  marginMode: isolated
  initialBalanceUsdt: 10000
  feeRate: 0.0004
  slippageBps: 5
  fillModel: conservative

backtest:
  klineCacheDir: ./data/klines
  reportDir: ./data/reports
  fillModel: conservative

storage:
  sqlitePath: ./data/trader.db

logging:
  level: info
  pretty: true

# Phase 6 EntryGate — vetoes weak MTF setups before risk engine.
entryGates:
  enabled: true
  logRejects: false
  captureRejects: false # set true + re-backtest to export gateRejects in trade review CSV
