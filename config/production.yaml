# Baseline: technical intraday — 4h EMA context + 1h emaMomentum only (no breakout / no newsVeto).
# Micro account preset (~32 USDT): leverage applied to notional sizing (see risk + sim/binance.margin).
# Point CONFIG_PATH here for testnet/sim; enable live only after docs/KIEM-TRA-LIVE.md.
# Huong dan Futures (tieng Viet): docs/HUONG-DAN-FUTURES.md

mode: sim

allowLive: false

symbols:
  - BTCUSDT
  # - ETHUSDT
  # - SOLUSDT
  # - BNBUSDT
  # - XRPUSDT

symbolOverrides: {}

timeframes:
  context: 4h
  entry: 1h

feeds:
  - id: coindesk
    url: https://www.coindesk.com/arc/outboundfeeds/rss/
    pollIntervalSec: 90
    enabled: true
  - id: cointelegraph
    url: https://cointelegraph.com/rss
    pollIntervalSec: 120
    enabled: true

sentiment:
  rules:
    impactHigh: 3
    thresholdLLM: 3
    minStrength: 0.5
    strongNewsThreshold: 0.75
    bullishKeywords:
      - rally
      - approval
      - inflow
      - rate cut
      - partnership
      - surge
    bearishKeywords:
      - hack
      - exploit
      - ban
      - lawsuit
      - outflow
      - rate hike
      - crash
    bearishTags:
      - hack
      - regulation
    macroTags:
      - macro
      - fed
      - cpi
    blacklistKeywords:
      - airdrop scam
      - guaranteed returns
    tagRules:
      - tag: macro
        keywords: [fed, cpi, fomc, interest rate, powell]
        impact: 3
      - tag: hack
        keywords: [hack, exploited, drained, breach]
        impact: 3
        sentiment: -1
      - tag: etf
        keywords: [etf, approval, inflow]
        impact: 2
  llm:
    enabled: false
    provider: openrouter
    baseUrl: https://openrouter.ai/api/v1
    model: openai/gpt-oss-120b:free
    maxCallsPerHour: 20
    minConfidence: 0.6
    timeoutMs: 15000
    defaultTtlMinutes: 45

strategy:
  atrPeriod: 14
  minAtrPercent: 0.12
  maxAtrPercent: 3.5
  entry:
    waitForNextCandleClose: true
  onePositionPerSymbol: true
  swing:
    lookback: 3
    minSwingCount: 5
    minImpulsePercent: 80
  elliott:
    allowSideways: false
    contextRequireImpulse: false
  fibonacci:
    entryMin: 0.382
    entryMax: 0.618
    zoneTolerancePercent: 0.02
    stopLevel: 0.886
    targetExtension: 1.618
    stopBelowSwing: true
    stopBufferPercent: 0.002
  triggerMode: technical
  newsVeto:
    enabled: false
    minStrength: 0.75
    vetoTags: [macro, hack, etf]
    leaderSymbol: BTCUSDT
  entryProfile: intraday
  profiles:
    # swing: Elliott + Fib — use triggerMode: news + seed-signals or --mock-sentiment for backtest
    # swing:
    #   contextMode: elliott
    #   entryPaths:
    #     primary: fib
    #   useAlternateFallback: true
    intraday:
      contextMode: emaTrend
      contextEma:
        fastPeriod: 20
        slowPeriod: 50
        flatPercent: 0.0005
      entryPaths:
        order: [
          # breakout,
          emaMomentum]
      positionScale: 1
  alternateEntries:
    enabled: false
    order:
      # - breakout
      - emaMomentum
    fallbackOnReasons:
      - outside_fib_zone
      - no_matching_impulse_leg
      - risk_reward_too_low
    positionScale: 1
    breakout:
      enabled: false 
      lookbackBars: 20
      bufferPercent: 0.001
    emaMomentum:
      enabled: true
      fastPeriod: 9
      slowPeriod: 21
      slopeLookback: 3

# Micro account: notional ≈ balance × positionPercent × leverage (maxNotional cap).
# 200 × 50% × 10x = 1000 → cap 160 USDT notional (~0.001+ BTC).
risk:
  positionPercent: 50
  minNotionalUsdt: 5
  maxNotionalUsdt: 90
  slAtrMultiplier: 2.0
  tpAtrMultiplier: 3.0
  trailingStop: false
  cooldownAfterLoss:
    enabled: true
    durationHours: 12

binance:
  baseUrl: https://fapi.binance.com
  testnetBaseUrl: https://testnet.binancefuture.com
  testnetWsUrl: wss://stream.binancefuture.com
  mainnetWsUrl: wss://fstream.binance.com
  recvWindow: 5000
  wsReconnectMaxRetries: 10
  margin:
    enabled: true
    mode: isolated
    leverage: 18
  circuitBreaker:
    enabled: true
    maxFailures: 3
    windowMs: 300000

sim:
  leverage: 18
  marginMode: isolated
  initialBalanceUsdt: 600
  feeRate: 0.0004
  slippageBps: 5
  fillModel: conservative

backtest:
  klineCacheDir: ./data/klines
  reportDir: ./data/reports
  fillModel: conservative

storage:
  sqlitePath: ./data/trader.db

logging:
  level: info
  pretty: true

entryGates:
  enabled: true
  logRejects: true
  captureRejects: true
